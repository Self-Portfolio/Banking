name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  backend-tests:
    name: Backend unit/API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e-tests:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install e2e deps
        working-directory: e2e
        run: npm ci
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: e2e
        env:
          CI: true
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

  e2e-java-tests:
    name: End-to-end tests (Java/Selenium/Cucumber/TestNG)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: e2e-java/pom.xml
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Start backend
        working-directory: backend
        run: nohup npm run dev > /tmp/backend.log 2>&1 &
      - name: Start frontend
        working-directory: frontend
        run: nohup npm run dev > /tmp/frontend.log 2>&1 &
      - name: Wait for backend and frontend to be ready
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:4000/api/health && break; sleep 1; done
          for i in $(seq 1 30); do curl -sf -o /dev/null http://localhost:5173 && break; sleep 1; done
      - name: Run Java e2e suite
        working-directory: e2e-java
        run: mvn test -B -Dheadless=true
      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: |
            e2e-java/target/cucumber-report.html
            e2e-java/target/surefire-reports/
          retention-days: 14
